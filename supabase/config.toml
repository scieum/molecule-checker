# Supabase local development config.
# Docs: https://supabase.com/docs/guides/cli/config
project_id = "molecule-checker"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "http://localhost:8000"
additional_redirect_urls = ["https://scieum.github.io/molecule-checker/"]
jwt_expiry = 3600
enable_anonymous_sign_ins = true
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions.analyze]
verify_jwt = true
